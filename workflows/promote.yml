name: Reusable — Promote Image
on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag to promote (e.g. v1.4.0)'
        required: true
        type: string
      image:
        description: 'Image name in Artifact Registry (e.g. ai-router)'
        required: true
        type: string
      registry:
        description: 'Artifact Registry host (e.g. us-central1-docker.pkg.dev)'
        required: true
        type: string
      project:
        description: 'GCP project ID'
        required: true
        type: string
      ar_repo:
        description: 'Artifact Registry repo name'
        required: true
        type: string
      environment:
        description: 'Target environment (uat or prod)'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}    # ← dynamic, triggers the right protection rule
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Configure crane auth
        run: gcloud auth configure-docker ${{ inputs.registry }} --quiet

      - name: Retag image
        run: |
          SOURCE="${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.version }}"
          TARGET="${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.environment }}"
          echo "Promoting $SOURCE → $TARGET"
          crane copy "$SOURCE" "$TARGET"

      - name: Summary
        run: |
          echo "### Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ inputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag pushed:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY