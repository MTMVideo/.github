name: Reusable — Promote Image
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      image:
        required: true
        type: string
      registry:
        required: true
        type: string
      project:
        required: true
        type: string
      ar_repo:
        required: true
        type: string
      environment:
        required: true
        type: string
      skip_uat_check:
        required: false
        type: boolean
        default: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Check maintainer permission
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['admin', 'maintain'];
            if (!allowed.includes(data.permission)) {
              core.setFailed(
                `🚫 ${context.actor} has permission '${data.permission}'. ` +
                `Only maintainers and admins can promote images.`
              );
            } else {
              core.info(`✅ ${context.actor} is authorized (${data.permission})`);
            }

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Configure crane auth
        run: gcloud auth configure-docker ${{ inputs.registry }} --quiet

      - name: Verify version tag exists
        run: |
          if ! crane digest \
            ${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.version }} > /dev/null 2>&1; then
            echo "❌ Version ${{ inputs.version }} not found in registry"
            exit 1
          fi
          echo "✅ Version ${{ inputs.version }} exists"

      - name: Verify UAT deployed before prod
        if: inputs.environment == 'prod' && inputs.skip_uat_check != true
        run: |
          VERSION_DIGEST=$(crane digest \
            ${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.version }})

          UAT_DIGEST=$(crane digest \
            ${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:uat 2>/dev/null || echo "NOT_FOUND")

          echo "Version digest: $VERSION_DIGEST"
          echo "UAT digest:     $UAT_DIGEST"

          if [ "$UAT_DIGEST" = "NOT_FOUND" ]; then
            echo "❌ UAT tag does not exist. Deploy to UAT first."
            exit 1
          fi

          if [ "$VERSION_DIGEST" != "$UAT_DIGEST" ]; then
            echo "❌ UAT is running a different version. Promote ${{ inputs.version }} to UAT first."
            exit 1
          fi

          echo "✅ UAT is running ${{ inputs.version }}. Safe to promote to prod."

      - name: Retag image
        run: |
          SOURCE="${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.version }}"
          TARGET="${{ inputs.registry }}/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}:${{ inputs.environment }}"
          echo "Promoting $SOURCE → $TARGET"
          crane copy "$SOURCE" "$TARGET"

      - name: Create audit log
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const success = '${{ job.status }}' === 'success';
            const skippedUat = '${{ inputs.skip_uat_check }}' === 'true';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${success ? '🚀' : '❌'} ${context.actor} ${success ? 'promoted' : 'failed to promote'} ${{ inputs.version }} to ${{ inputs.environment }}`,
              body: [
                `**Promoted by:** ${context.actor}`,
                `**Version:** ${{ inputs.version }}`,
                `**Environment:** ${{ inputs.environment }}`,
                `**Status:** ${success ? '✅ Success' : '❌ Failed'}`,
                skippedUat ? '**⚠️ UAT check was skipped**' : '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].filter(Boolean).join('\n'),
              labels: ['deployment'],
            });

      - name: Summary
        if: always()
        run: |
          echo "### Promotion ${{ job.status == 'success' && 'Complete ✅' || 'Failed ❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ inputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.skip_uat_check }}" = "true" ]; then
            echo "**⚠️ UAT check was skipped**" >> $GITHUB_STEP_SUMMARY
          fi